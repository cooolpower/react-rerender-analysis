<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReactPerf Popup</title>
    <style>
      body {
        width: 300px;
        padding: 16px;
        background: #0d0d0d;
        color: #e8e8e8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #2a2a2a;
        padding-bottom: 12px;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }
      .dot.online {
        background: #22c55e;
        box-shadow: 0 0 8px #22c55e;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 11px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 8px 10px;
        color: #e8e8e8;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #6366f1;
      }
      button {
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #4f46e5;
      }
      .footer {
        margin-top: 8px;
        font-size: 11px;
        color: #6b7280;
        text-align: center;
      }
      a {
        color: #6366f1;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <span>⚡</span>
        <h1>ReactPerf</h1>
      </header>

      <div class="status">
        <div id="status-dot" class="dot"></div>
        <span id="status-text">Disconnected</span>
      </div>

      <div class="form-group">
        <label for="backend-url">Backend URL</label>
        <input type="text" id="backend-url" placeholder="http://localhost:3000" />
      </div>

      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Paste your API key here..." />
      </div>

      <button id="save-btn">Save & Connect</button>

      <div class="footer">
        Go to <a href="https://react-perf.io/dashboard" target="_blank">Dashboard</a> for settings
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
