<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReactPerf</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0d0d0d;
        color: #e8e8e8;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: #161616;
        border-bottom: 1px solid #2a2a2a;
      }

      header h1 {
        font-size: 14px;
        font-weight: 700;
      }
      .badge {
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 700;
        font-family: monospace;
      }
      .badge-live {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
      }
      .badge-idle {
        background: rgba(107, 114, 128, 0.15);
        color: #6b7280;
      }

      .tabs {
        display: flex;
        border-bottom: 1px solid #2a2a2a;
        background: #161616;
      }
      .tab {
        padding: 8px 16px;
        cursor: pointer;
        font-size: 12px;
        color: #6b7280;
        border-bottom: 2px solid transparent;
      }
      .tab.active {
        color: #6366f1;
        border-bottom-color: #6366f1;
      }

      .panel {
        padding: 12px;
        height: calc(100vh - 80px);
        overflow-y: auto;
      }

      .row {
        display: grid;
        gap: 10px;
        padding: 6px 0;
        border-bottom: 1px solid #1e1e1e;
        align-items: center;
      }
      .row-render {
        grid-template-columns: 150px 1fr 50px 80px;
      }
      .row-api {
        grid-template-columns: 40px 1fr 1fr 55px 60px;
      }

      .name {
        font-family: monospace;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bar-wrap {
        background: #1e1e1e;
        border-radius: 3px;
        height: 5px;
        overflow: hidden;
      }
      .bar {
        height: 100%;
        border-radius: 3px;
      }

      .mono {
        font-family: monospace;
        font-size: 11px;
        text-align: right;
      }
      .red {
        color: #ef4444;
      }
      .yellow {
        color: #f59e0b;
      }
      .green {
        color: #22c55e;
      }
      .blue {
        color: #6366f1;
      }
      .muted {
        color: #6b7280;
      }

      #empty {
        text-align: center;
        padding: 60px 20px;
        color: #6b7280;
      }

      #api-key-form {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      #api-key-form .box {
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 24px;
        width: 320px;
      }
      #api-key-form h2 {
        font-size: 14px;
        margin-bottom: 8px;
      }
      #api-key-form p {
        color: #6b7280;
        font-size: 12px;
        margin-bottom: 14px;
      }
      #api-key-form input {
        width: 100%;
        padding: 8px 10px;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        color: #e8e8e8;
        font-family: monospace;
        font-size: 12px;
        outline: none;
        margin-bottom: 12px;
      }
      #api-key-form button {
        width: 100%;
        padding: 8px;
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="api-key-form">
      <div class="box">
        <h2>⚡ ReactPerf</h2>
        <p>Enter your API key from the ReactPerf dashboard settings.</p>
        <input id="api-key-input" type="text" placeholder="Your API key..." />
        <button id="api-key-save">Connect</button>
      </div>
    </div>

    <header>
      <span>⚡</span>
      <h1>ReactPerf</h1>
      <span id="status-badge" class="badge badge-idle">IDLE</span>
    </header>

    <div class="tabs">
      <div class="tab active" data-tab="renders">Render Heatmap</div>
      <div class="tab" data-tab="api">API Waterfall</div>
    </div>

    <div id="panel-renders" class="panel">
      <div id="empty">
        <div style="font-size: 32px; margin-bottom: 12px">🔍</div>
        <p>Open a React app to start capturing renders.</p>
      </div>
      <div id="render-rows"></div>
    </div>

    <div id="panel-api" class="panel" style="display: none">
      <div id="api-rows"></div>
    </div>

    <script src="panel.js"></script>
  </body>
</html>
